name: kasirsuper
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  dio: ^5.4.3+1
  equatable: ^2.0.5
  firebase_analytics: ^11.3.0
  firebase_core: ^3.4.0
  firebase_crashlytics: ^4.1.0
  firebase_remote_config: ^5.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  flutter_esc_pos_utils: ^1.0.1
  image_picker: ^1.1.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  open_settings: ^2.0.2
  package_info_plus: ^8.0.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  print_bluetooth_thermal: ^1.1.0
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  sentry_flutter: ^8.9.0
  share_plus: ^7.2.2
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.9

  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/icons/CustomIcons.ttf
